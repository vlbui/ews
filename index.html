<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EWS · Swine Pathogen Surveillance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{--bg:#0F1117;--s1:#161B27;--s2:#1C2235;--bd:rgba(255,255,255,0.07);--bd2:rgba(255,255,255,0.13);--tx:#DDE3F0;--tx2:#8892AA;--tx3:#4E586E;--red:#FF5370;--red-d:rgba(255,83,112,0.12);--red-b:rgba(255,83,112,0.28);--amb:#FFB86C;--amb-d:rgba(255,184,108,0.10);--amb-b:rgba(255,184,108,0.26);--grn:#50FA7B;--grn-d:rgba(80,250,123,0.09);--grn-b:rgba(80,250,123,0.22);--blu:#82AAFF;--blu-d:rgba(130,170,255,0.09);--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--r:6px;--r2:10px;--r3:14px;--ease:cubic-bezier(.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;scroll-behavior:smooth}
body{font-family:var(--sans);background:var(--bg);color:var(--tx);min-height:100vh}
.header{display:flex;align-items:center;gap:16px;padding:0 28px;height:52px;background:var(--s1);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px}
.logo-dot{width:8px;height:8px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn);animation:blink 2.4s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.logo-text{font-size:13px;font-weight:600;letter-spacing:.02em}
.logo-sub{font-size:11px;color:var(--tx2);font-weight:400;margin-left:2px}
.header-sep{flex:1}
.lang-btn{display:flex;background:var(--s2);border:1px solid var(--bd2);border-radius:20px;overflow:hidden}
.lang-opt{padding:4px 13px;font-size:11px;font-weight:500;cursor:pointer;color:var(--tx2);background:transparent;border:none;font-family:var(--sans);transition:all .2s}
.lang-opt.active{background:var(--blu-d);color:var(--blu)}
.upd{font-family:var(--mono);font-size:10px;color:var(--tx3);padding:4px 10px;background:var(--s2);border:1px solid var(--bd);border-radius:var(--r)}
.wrap{max-width:1280px;margin:0 auto;padding:24px 28px 48px}
.section{margin-bottom:32px}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.sl{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--tx3)}
.sline{flex:1;height:1px;background:var(--bd)}
.stag{font-size:10px;color:var(--tx3);font-family:var(--mono)}
/* Alert cards */
.ag{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
.ac{border-radius:var(--r2);border:1px solid var(--bd);background:var(--s1);padding:12px 14px;position:relative;overflow:hidden;transition:transform .2s var(--ease),border-color .2s;cursor:default}
.ac::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:var(--r2) var(--r2) 0 0}
.ac.alert{background:var(--red-d);border-color:var(--red-b)}.ac.alert::after{background:var(--red)}
.ac.warn{background:var(--amb-d);border-color:var(--amb-b)}.ac.warn::after{background:var(--amb)}
.ac.normal::after{background:var(--grn);opacity:.5}
.ac:hover{transform:translateY(-1px);border-color:var(--bd2)}
.ac-name{font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--tx2);text-transform:uppercase;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ac-val{font-family:var(--mono);font-size:28px;font-weight:500;line-height:1;margin-bottom:5px}
.ac.alert .ac-val{color:var(--red)}.ac.warn .ac-val{color:var(--amb)}.ac.normal .ac-val{color:var(--grn)}
.ac-badge{display:inline-flex;align-items:center;font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px}
.ac-badge.alert{background:rgba(255,83,112,.15);color:var(--red)}
.ac-badge.warn{background:rgba(255,184,108,.15);color:var(--amb)}
.ac-badge.normal{background:rgba(80,250,123,.10);color:var(--grn)}
.ac-th{font-family:var(--mono);font-size:9.5px;color:var(--tx3);margin-top:5px}
/* Trend */
.tpanel{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);padding:18px 20px}
.ttop{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.ttitle{font-size:13px;font-weight:600}
.tmethod{font-size:10px;color:var(--tx2);font-family:var(--mono);padding:2px 8px;background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r)}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--bd2);color:var(--tx2);cursor:pointer;background:transparent;font-family:var(--sans);transition:all .15s}
.pill:hover{border-color:var(--blu);color:var(--blu)}
.pill.on{border-color:transparent;color:#fff}
.cb{position:relative;width:100%;height:280px;margin-top:12px}
.cbsm{position:relative;width:100%;height:165px}
.legrow{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.ll{width:18px;height:2px;border-radius:1px}
.ld{width:18px;height:0;border-top:2px dashed;border-radius:1px}
/* panels */
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.panel{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);padding:16px 18px}
.ptitle{font-size:12px;font-weight:600;margin-bottom:4px}
.psub{font-size:11px;color:var(--tx2);margin-bottom:10px;line-height:1.5}
.psel{font-family:var(--sans);font-size:11px;color:var(--tx);background:var(--s2);border:1px solid var(--bd2);border-radius:var(--r);padding:4px 8px;cursor:pointer;margin-bottom:10px}
/* table */
.mt{width:100%;border-collapse:collapse;font-size:11.5px}
.mt th{color:var(--tx3);font-weight:500;font-size:10px;letter-spacing:.06em;text-transform:uppercase;text-align:left;padding:5px 8px;border-bottom:1px solid var(--bd)}
.mt td{padding:7px 8px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--tx)}
.mt tr:last-child td{border:none}.mt tr:hover td{background:var(--s2)}
/* reco */
.rg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.rc{background:var(--s1);border:1px solid var(--bd);border-radius:var(--r3);padding:16px 18px;transition:border-color .2s,transform .2s var(--ease);position:relative;overflow:hidden}
.rc:hover{border-color:var(--bd2);transform:translateY(-2px)}
.ri{width:36px;height:36px;border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:12px}
.rc.c1 .ri{background:rgba(255,83,112,.12)}.rc.c2 .ri{background:rgba(255,184,108,.10)}
.rc.c3 .ri{background:rgba(80,250,123,.09)}.rc.c4 .ri{background:rgba(130,170,255,.09)}
.rtitle{font-size:13px;font-weight:600;margin-bottom:6px}
.rbody{font-size:11.5px;color:var(--tx2);line-height:1.65;margin-bottom:10px}
.rlist{display:flex;flex-direction:column;gap:5px}
.ritem{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:var(--tx2);line-height:1.4}
.rdot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:5px}
.rc.c1 .rdot{background:var(--red)}.rc.c2 .rdot{background:var(--amb)}
.rc.c3 .rdot{background:var(--grn)}.rc.c4 .rdot{background:var(--blu)}
.rtag{display:inline-flex;margin-top:12px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.04em}
.rc.c1 .rtag{background:var(--red-d);color:var(--red)}.rc.c2 .rtag{background:var(--amb-d);color:var(--amb)}
.rc.c3 .rtag{background:var(--grn-d);color:var(--grn)}.rc.c4 .rtag{background:var(--blu-d);color:var(--blu)}
.footer{border-top:1px solid var(--bd);padding:16px 28px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--tx3)}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
@keyframes su{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ac{animation:su .35s var(--ease) both}
.ac:nth-child(1){animation-delay:.04s}.ac:nth-child(2){animation-delay:.08s}.ac:nth-child(3){animation-delay:.12s}
.ac:nth-child(4){animation-delay:.16s}.ac:nth-child(5){animation-delay:.20s}.ac:nth-child(6){animation-delay:.24s}.ac:nth-child(7){animation-delay:.28s}
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    <span class="logo-text">EWS</span>
    <span class="logo-sub" id="i-subtitle"></span>
  </div>
  <div class="header-sep"></div>
  <span style="font-family:var(--mono);font-size:10.5px;color:var(--tx3)" id="i-meta"></span>
  <div class="upd" id="updBadge"></div>
  <div class="lang-btn">
    <button class="lang-opt active" onclick="setLang('vi')">VI</button>
    <button class="lang-opt" onclick="setLang('en')">EN</button>
  </div>
</header>

<div class="wrap">
  <!-- ALERTS -->
  <div class="section">
    <div class="sh"><span class="sl" id="i-s1title"></span><div class="sline"></div><span class="stag" id="i-s1tag"></span></div>
    <div class="ag" id="alertGrid"></div>
  </div>

  <!-- TREND -->
  <div class="section">
    <div class="sh">
      <span class="sl" id="i-s2title"></span><div class="sline"></div>
      <select class="psel" id="methodSel" onchange="drawTrend()" style="margin-bottom:0">
        <option value="farr" id="i-optFarr"></option>
        <option value="ms"   id="i-optMs"></option>
      </select>
    </div>
    <div class="tpanel">
      <div class="ttop">
        <span class="ttitle" id="i-trendTitle"></span>
        <span class="tmethod" id="trendBadge"></span>
        <div class="header-sep"></div>
        <div class="pills" id="trendPills"></div>
      </div>
      <div class="cb"><canvas id="trendC"></canvas></div>
      <div class="legrow" id="trendLeg"></div>
    </div>
  </div>

  <!-- CUSUM + TABLE -->
  <div class="section row2">
    <div class="panel">
      <div class="ptitle" id="i-cusumTitle"></div>
      <div class="psub"   id="i-cusumSub"></div>
      <select class="psel" id="cusumSel" onchange="drawCusum()"></select>
      <div class="cbsm"><canvas id="cusumC"></canvas></div>
    </div>
    <div class="panel">
      <div class="ptitle" id="i-methodTitle"></div>
      <div class="psub"   id="i-methodSub"></div>
      <table class="mt">
        <thead><tr>
          <th id="i-colPath"></th><th id="i-colMs"></th>
          <th id="i-colFarr"></th><th id="i-colHhh"></th>
          <th>HHH4 λ</th><th id="i-colSt"></th>
        </tr></thead>
        <tbody id="methodBody"></tbody>
      </table>
    </div>
  </div>

  <!-- RECOS -->
  <div class="section">
    <div class="sh"><span class="sl" id="i-s4title"></span><div class="sline"></div><span class="stag" id="i-s4tag"></span></div>
    <div class="rg" id="recoGrid"></div>
  </div>
</div>

<footer class="footer">
  <span id="i-footL"></span><span id="i-footR"></span>
</footer>

let lang='vi',selP=['PRRS','ASF','Streptococcus'],charts={},cusumP='PRRS';

function t(k){return T[lang][k]||k}
function sid(id,k){const el=document.getElementById(id);if(el&&T[lang][k]!==undefined)el.textContent=T[lang][k]}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-opt').forEach(el=>el.classList.toggle('active',el.textContent===l.toUpperCase()));
  const keys=['subtitle','meta','s1title','s1tag','s2title','trendTitle','s4title','s4tag','cusumTitle','cusumSub','methodTitle','methodSub','colPath','colMs','colFarr','colHhh','colSt','footL','footR'];
  keys.forEach(k=>sid('i-'+k,k));
  document.getElementById('i-optFarr').textContent=t('optFarr');
  document.getElementById('i-optMs').textContent=t('optMs');
  buildAlerts();buildRecos();buildMethodTable();updateTrendBadge();buildTrendLeg();
  if(charts.trend)drawTrend();if(charts.cusum)drawCusum();
}

function mkLabels(){
  return WEEKS.map((w,i,a)=>{
    const d=new Date(w),p=i?new Date(a[i-1]):null;
    if(!p||d.getFullYear()!==p.getFullYear())return String(d.getFullYear());
    if(d.getDate()<=7)return['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
    return'';
  });
}

function getStatus(p){
  const o=OBS[p],th=THRESH[p];if(!o||!th)return'normal';
  const avg=o.slice(-4).reduce((a,b)=>a+b,0)/4;
  return avg>=th.alert?'alert':avg>=th.warn?'warn':'normal';
}

function buildAlerts(){
  document.getElementById('alertGrid').innerHTML=KP.map(p=>{
    const o=OBS[p],th=THRESH[p]||{};
    const latest=o[o.length-1],avg=+(o.slice(-4).reduce((a,b)=>a+b,0)/4).toFixed(1),st=getStatus(p);
    const label=st==='alert'?t('sAlert'):st==='warn'?t('sWarn'):t('sNormal');
    return`<div class="ac ${st}"><div class="ac-name">${p.replace('Mycoplasma ','M.')}</div><div class="ac-val">${latest}</div><span class="ac-badge ${st}">${label}</span><div class="ac-th">⌀4w: ${avg} · warn: ${th.warn||'—'}</div></div>`;
  }).join('');
}

function updateTrendBadge(){
  const m=document.getElementById('methodSel').value;
  document.getElementById('trendBadge').textContent=m==='farr'?t('tBadgeFarr'):t('tBadgeMs');
}
function buildTrendPills(){
  document.getElementById('trendPills').innerHTML=KP.map(p=>`<button class="pill${selP.includes(p)?' on':''}" style="${selP.includes(p)?`background:${CLR[p]}25;border-color:${CLR[p]};color:${CLR[p]}`:''}" onclick="togP('${p}')">${p.replace('Mycoplasma ','M.')}</button>`).join('');
}
function togP(p){selP.includes(p)?selP=selP.filter(x=>x!==p):selP.push(p);buildTrendPills();drawTrend();}
function buildTrendLeg(){
  const m=document.getElementById('methodSel').value,upper=m==='farr'?t('lFarr'):t('lMs');
  document.getElementById('trendLeg').innerHTML=`<div class="leg"><div class="ll" style="background:#aaa"></div>${t('lObs')}</div><div class="leg"><div class="ld" style="border-color:#FFB86C"></div>${upper}</div><div class="leg"><div class="ld" style="border-color:#82AAFF"></div>${t('lHhh')}</div>`;
}
function drawTrend(){
  updateTrendBadge();buildTrendLeg();
  const labels=mkLabels(),m=document.getElementById('methodSel').value,ds=[];
  selP.forEach(p=>{
    const th=THRESH[p]||{},up=m==='farr'?FARR_U[p]:Array(WEEKS.length).fill(th.alert);
    ds.push({label:p,data:OBS[p],borderColor:CLR[p],backgroundColor:CLR[p]+'18',borderWidth:1.5,pointRadius:0,tension:0.3,fill:false,order:3});
    if(up)ds.push({label:p+' upper',data:up,borderColor:'#FFB86C',borderWidth:1,borderDash:[5,4],pointRadius:0,fill:false,order:2});
    if(HHH4_U[p])ds.push({label:p+' hhh4',data:HHH4_U[p],borderColor:CLR[p],borderWidth:1,borderDash:[2,5],pointRadius:0,fill:false,order:1});
  });
  const gc='rgba(255,255,255,.04)',tc='#4E586E';
  const cfg={type:'line',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{autoSkip:false,maxRotation:0,font:{size:9},color:tc}},y:{beginAtZero:true,grid:{color:gc},ticks:{color:tc}}}}};
  if(charts.trend){charts.trend.data=cfg.data;charts.trend.options=cfg.options;charts.trend.update();}
  else charts.trend=new Chart(document.getElementById('trendC'),cfg);
}

function buildCusumSel(){
  const sel=document.getElementById('cusumSel');
  sel.innerHTML=KP.map(p=>`<option value="${p}"${p===cusumP?' selected':''}>${p.replace('Mycoplasma ','M.')}</option>`).join('');
}
function drawCusum(){
  const p=document.getElementById('cusumSel').value;cusumP=p;
  const th=THRESH[p]||{mean:0,std:1},mu=th.mean,sigma=th.std,k=0.5,h=4*sigma;
  let C=0;const cusum=OBS[p].map(x=>{C=Math.max(0,C+(x-mu-k*sigma));return+C.toFixed(2);});
  const gc='rgba(255,255,255,.04)',tc='#4E586E';
  const cfg={type:'line',data:{labels:mkLabels(),datasets:[{label:'CUSUM',data:cusum,borderColor:CLR[p],backgroundColor:CLR[p]+'15',borderWidth:1.5,pointRadius:0,tension:0.2,fill:true},{label:'h',data:Array(WEEKS.length).fill(+h.toFixed(1)),borderColor:'#FF5370',borderWidth:1,borderDash:[4,3],pointRadius:0,fill:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:gc},ticks:{autoSkip:true,maxRotation:0,font:{size:9},color:tc}},y:{beginAtZero:true,grid:{color:gc},ticks:{color:tc}}}}};
  if(charts.cusum){charts.cusum.data=cfg.data;charts.cusum.options=cfg.options;charts.cusum.update();}
  else charts.cusum=new Chart(document.getElementById('cusumC'),cfg);
}

function buildMethodTable(){
  document.getElementById('methodBody').innerHTML=KP.map(p=>{
    const a=ALARMS[p]||{ms:0,farr:0,hhh:0,lam:null},st=getStatus(p);
    const badge=st==='alert'?`<span style="color:var(--red);font-size:10px;font-weight:600">${t('sAlert')}</span>`:st==='warn'?`<span style="color:var(--amb);font-size:10px;font-weight:600">${t('sWarn')}</span>`:`<span style="color:var(--grn);font-size:10px;font-weight:600">${t('sNormal')}</span>`;
    return`<tr><td style="color:${CLR[p]};font-weight:500">${p.replace('Mycoplasma ','M.')}</td><td style="font-family:var(--mono);color:var(--red)">${a.ms}</td><td style="font-family:var(--mono);color:var(--amb)">${a.farr}</td><td style="font-family:var(--mono);color:var(--blu)">${a.hhh}</td><td style="font-family:var(--mono)">${a.lam!=null?a.lam:'—'}</td><td>${badge}</td></tr>`;
  }).join('');
}

function buildRecos(){
  document.getElementById('recoGrid').innerHTML=T[lang].recos.map(r=>`<div class="rc ${r.cls}"><div class="ri">${r.icon}</div><div class="rtitle">${r.title}</div><div class="rbody">${r.body}</div><div class="rlist">${r.items.map(i=>`<div class="ritem"><div class="rdot"></div><span>${i}</span></div>`).join('')}</div><div class="rtag">${r.tag}</div></div>`).join('');

document.getElementById('updBadge').textContent=`${T.vi.updAt} ${now.toLocaleDateString('vi-VN')} ${now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'})}`;
